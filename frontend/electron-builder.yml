appId: com.deepseek.proxy
productName: AI Proxy Manager
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraFiles:
  - from: ../api_server.py
    to: api_server.py
  - from: ../proxy
    to: proxy
win:
  target: dir
  signAndEditExecutable: false